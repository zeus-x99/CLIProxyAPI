name: sync-upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.CLIPROXYAPI_ACTIONS_PAT || github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.CLIPROXYAPI_ACTIONS_PAT || github.token }}
          persist-credentials: true

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/router-for-me/CLIProxyAPI.git 2>/dev/null || true
          git fetch origin main
          git fetch upstream main --tags

      - name: Detect upstream updates
        id: detect
        run: |
          behind="$(git rev-list --right-only --count origin/main...upstream/main)"
          if [ "$behind" = "0" ]; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          current_tag="$(git tag --merged origin/main --sort=-v:refname | grep '^v' | head -n1 || true)"
          upstream_tag="$(git tag --merged upstream/main --sort=-v:refname | grep '^v' | head -n1 || true)"
          if [ -z "$current_tag" ] && [ -f VERSION ]; then
            current_tag="$(tr -d '\r\n' < VERSION)"
          fi
          current_short="$(git rev-parse --short origin/main)"
          upstream_short="$(git rev-parse --short upstream/main)"

          if [ -n "$current_tag" ] && [ -n "$upstream_tag" ] && [ "$current_tag" != "$upstream_tag" ]; then
            title="chore(upstream): ${current_tag} -> ${upstream_tag}"
          else
            title="chore(upstream): ${current_short} -> ${upstream_short}"
          fi

          {
            echo "has_updates=true"
            echo "branch=sync-upstream/main"
            echo "title=${title}"
            echo "upstream_short=${upstream_short}"
          } >> "$GITHUB_OUTPUT"

      - name: Merge upstream into sync branch
        if: steps.detect.outputs.has_updates == 'true'
        run: |
          git checkout -B "${{ steps.detect.outputs.branch }}" origin/main
          if ! git merge --no-edit upstream/main; then
            keep_ours_files=(
              AGENTS.md
              .github/workflows/agents-md-guard.yml
              .github/workflows/auto-retarget-main-pr-to-dev.yml
              .github/workflows/pr-path-guard.yml
            )

            unresolved="$(git diff --name-only --diff-filter=U || true)"

            for path in "${keep_ours_files[@]}"; do
              if printf '%s\n' "${unresolved}" | grep -Fxq "${path}"; then
                git checkout --ours -- "${path}"
                git add "${path}"
              fi
            done

            remaining_unresolved="$(git diff --name-only --diff-filter=U || true)"
            if [ -n "${remaining_unresolved}" ]; then
              printf 'Unresolved merge conflicts remain:\n%s\n' "${remaining_unresolved}" >&2
              exit 1
            fi

            git commit --no-edit
          fi

          latest_tag="$(git tag --merged HEAD --sort=-v:refname | grep '^v' | head -n1 || true)"
          if [ -n "$latest_tag" ]; then
            printf '%s\n' "$latest_tag" > VERSION
            git add VERSION
            if ! git diff --cached --quiet; then
              git commit --amend --no-edit
            fi
          fi

      - name: Push sync branch
        if: steps.detect.outputs.has_updates == 'true'
        run: |
          git push --force-with-lease origin "${{ steps.detect.outputs.branch }}"

      - name: Create or update pull request
        if: steps.detect.outputs.has_updates == 'true'
        id: pr
        run: |
          branch_ref="${{ steps.detect.outputs.branch }}"
          head_ref="${GITHUB_REPOSITORY_OWNER}:${branch_ref}"
          pr_number="$(gh pr list --repo "${GITHUB_REPOSITORY}" --state open --head "${branch_ref}" --base main --json number --jq '.[0].number')"

          if [ -z "$pr_number" ]; then
            pr_url="$(gh pr create \
              --repo "${GITHUB_REPOSITORY}" \
              --base main \
              --head "${head_ref}" \
              --title "${{ steps.detect.outputs.title }}" \
              --body "Automated upstream sync from router-for-me/CLIProxyAPI.")"
            pr_number="${pr_url##*/}"
          else
            gh pr edit "$pr_number" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${{ steps.detect.outputs.title }}" \
              --body "Automated upstream sync from router-for-me/CLIProxyAPI."
          fi

          echo "number=${pr_number}" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        if: steps.detect.outputs.has_updates == 'true'
        continue-on-error: true
        run: |
          gh pr merge "${{ steps.pr.outputs.number }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --squash \
            --auto \
            --delete-branch \
            --subject "${{ steps.detect.outputs.title }}" \
            --body ""
