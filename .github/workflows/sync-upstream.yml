name: sync-upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/router-for-me/CLIProxyAPI.git 2>/dev/null || true
          git fetch origin main
          git fetch upstream main --tags

      - name: Detect upstream updates
        id: detect
        run: |
          behind="$(git rev-list --right-only --count origin/main...upstream/main)"
          if [ "$behind" = "0" ]; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          current_tag="$(git tag --merged origin/main --sort=-v:refname | grep '^v' | head -n1 || true)"
          upstream_tag="$(git tag --merged upstream/main --sort=-v:refname | grep '^v' | head -n1 || true)"
          current_short="$(git rev-parse --short origin/main)"
          upstream_short="$(git rev-parse --short upstream/main)"

          if [ -n "$current_tag" ] && [ -n "$upstream_tag" ] && [ "$current_tag" != "$upstream_tag" ]; then
            title="chore(upstream): ${current_tag} -> ${upstream_tag}"
          else
            title="chore(upstream): ${current_short} -> ${upstream_short}"
          fi

          echo "has_updates=true" >> "$GITHUB_OUTPUT"
          echo "branch=sync-upstream/main" >> "$GITHUB_OUTPUT"
          echo "title=${title}" >> "$GITHUB_OUTPUT"
          echo "upstream_short=${upstream_short}" >> "$GITHUB_OUTPUT"

      - name: Merge upstream into sync branch
        if: steps.detect.outputs.has_updates == 'true'
        run: |
          git checkout -B "${{ steps.detect.outputs.branch }}" origin/main
          git merge --no-edit upstream/main

      - name: Push sync branch
        if: steps.detect.outputs.has_updates == 'true'
        run: |
          git push --force-with-lease origin "${{ steps.detect.outputs.branch }}"

      - name: Create or update pull request
        if: steps.detect.outputs.has_updates == 'true'
        id: pr
        run: |
          pr_number="$(gh pr list --head "${{ steps.detect.outputs.branch }}" --base main --json number --jq '.[0].number')"

          if [ -z "$pr_number" ]; then
            pr_url="$(gh pr create \
              --base main \
              --head "${{ steps.detect.outputs.branch }}" \
              --title "${{ steps.detect.outputs.title }}" \
              --body "Automated upstream sync from router-for-me/CLIProxyAPI.")"
            pr_number="${pr_url##*/}"
          else
            gh pr edit "$pr_number" \
              --title "${{ steps.detect.outputs.title }}" \
              --body "Automated upstream sync from router-for-me/CLIProxyAPI."
          fi

          echo "number=${pr_number}" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        if: steps.detect.outputs.has_updates == 'true'
        continue-on-error: true
        run: |
          gh pr merge "${{ steps.pr.outputs.number }}" \
            --squash \
            --auto \
            --delete-branch \
            --subject "${{ steps.detect.outputs.title }}" \
            --body ""
